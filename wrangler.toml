name = "resumecraft"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "src/worker/index.ts"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "resumecraft-db"
database_id = "xxx"

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "resumecraft-assets"

# 环境变量
[vars]
APP_NAME="ResumeCraft"
APP_URL="https://jianli.cxlvip.com"
JWT_SECRET="change-me-use-wrangler-secret-before-production"
OPENAI_API_KEY="placeholder"
